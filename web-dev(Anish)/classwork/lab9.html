<!DOCTYPE html>
<html>

<head>
    <title>Auto Reload Page</title>
</head>

<body>

    <h2>This page reloads every 5 seconds</h2>

    <script>
        setTimeout(function () {
            location.reload();
        }, 5000); // 5000 milliseconds = 5 seconds
    </script>

</body>

</html>
