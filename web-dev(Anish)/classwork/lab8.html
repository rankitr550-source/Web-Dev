<!DOCTYPE html>
<html>

<head>
    <title>Restaurant Menu Form</title>
</head>
<body>
    <h2>Restaurant Food Menu</h2>
    <form>
        <!-- Veg Section -->
        <h3>Veg Items</h3>
        <input type="checkbox" name="food" value="Paneer Butter Masala"> Paneer Butter Masala <br>
        <input type="checkbox" name="food" value="Veg Biryani"> Veg Biryani <br>
        <input type="checkbox" name="food" value="Dal Tadka"> Dal Tadka <br>

        <!-- Non-Veg Section -->
        <h3>Non-Veg Items</h3>
        <input type="checkbox" name="food" value="Chicken Curry"> Chicken Curry <br>
        <input type="checkbox" name="food" value="Mutton Biryani"> Mutton Biryani <br>
        <input type="checkbox" name="food" value="Fish Fry"> Fish Fry <br>

        <!-- Fast Food Section -->
        <h3>Fast Food</h3>
        <input type="checkbox" name="food" value="Pizza"> Pizza <br>
        <input type="checkbox" name="food" value="Burger"> Burger <br>
        <input type="checkbox" name="food" value="Pasta"> Pasta <br>

        <!-- Drinks -->
        <h3>Drinks</h3>
        <input type="checkbox" name="food" value="Cold Drink"> Cold Drink <br>
        <input type="checkbox" name="food" value="Coffee"> Coffee <br>
        <input type="checkbox" name="food" value="Tea"> Tea <br>

        <br>
        <input type="submit" value="Order Now">
        <input type="reset" value="Clear">

    </form>

</body>

</html>
