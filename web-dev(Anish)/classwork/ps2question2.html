    <!DOCTYPE html>
    <html lang="en">
    <head>
        <title>ANUBHUTI 2K23 - Event Registration</title>
    </head>
    <body>

        <h2 align="center">Event Registration Form </h2>
        <h3 align="center">ANUBHUTI 2K23 </h3>

        <form action="#" method="post">
            FULL Name:
            <input type="text" name="name" required><br><br>

            Roll Number:
            <input type="tel" name="roll number" required><br><br>

            ERP ID:
            <input type="tel" name="ERP ID "required> <br><br>
            
            Email ID:
            <input type="email" name="email" required ><br><br>

            Mobile number:
            <input type="tel" name="Mobile" required><br><br>

            College Name:
            <input type="text" name="College"><br><br>

            Gender:
            <input type="radio" name="Gender" value="Male"> Male
            <input type="radio" name="Gender" value="female"> Female
            <input type="radio" name="Gender" value="Other"> Other 
            <br><br>

            Event Category:
            <select name="Category">
                <option >Technical</option>
                <option >Cultural</option>
                <option >Sports</option>
                <option >Workshop</option>
            </select>
            <br><br>

            Event Interested In: <br>
            <input type="checkbox" name="event 1">paper Presentartion <br>
            <input type="checkbox" name="event 3">Coding Contest<br>
            <input type="checkbox" name="event 2">Dance<br>
            <input type="checkbox" name="event 4">Quiz<br><br>

            Create Password:
            <input type="password" name="password"><br><br>

            Upload college ID:
            <input type="file" name="idcard"><br><br>

            Address: <br>
            <textarea rows="4" cols="30"></textarea><br><br>

            <input type="submit" value="Register">
            <input type="reset" value="Clear">
        </form>
    </body>
    </html>
