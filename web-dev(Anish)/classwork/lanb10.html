<!DOCTYPE html>
<html>
<head>
    <title>CSS Example</title>
    <style>
        /* Set background color */
        body {
            background-color: rgb(53, 155, 152);
            font-family: Arial, sans-serif; /* Set font */
        }
        /* Style heading */
        h1 {
            color: rgb(11, 11, 234);
            text-align: center;
        }
        /* Style paragraph */
        p {
            color: black;
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<h1>Welcome to My Page</h1>
<p>
This is a sample paragraph to demonstrate CSS styling. 
The background color, font, and paragraph style are set using CSS.
</p>
</body>
</html>
