<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists - HTML Tutorial</title>
</head>

<body>
    <h1>Lists in html</h1>
    <!-- ordered list  -->
    <h2>steps to bake a cake </h2>
    <ol>
        <li>the over a barke</li>
        <li>a cake is very sweet</li>

    </ol>

    <!-- unordered list -->
    <h2>Groceries to buy</h2>
    <ul>
        <li>milk</li>
        <li> bread</li>
        <li>Eggs</li>
    </ul>
    <!-- definition list -->
    <h2>programming languages</h2>
    <dl>
        <dt>python</dt>
        <!-- definition term -->
        <dd>this is very easy program languages.</dd>
        <!-- definition data -->
        <dt>html</dt>
        <dd>the standard markup languages.</dd>
    </dl>
</body>

</html>
